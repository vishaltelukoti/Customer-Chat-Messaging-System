<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Chat Messaging System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="app">
        <header class="app-header">
            <div>
                <p class="eyebrow">Azure Service Bus POC</p>
                <h1>Customer Chat Messaging System</h1>
            </div>
            <div class="queue-pills" aria-label="Available queues">
                <span>technical-support</span>
                <span>sales-chat</span>
                <span>customer-feedback</span>
            </div>
        </header>

        <section class="metrics" aria-label="Queue metrics">
            <div class="metric-card total">
                <span>Total Active</span>
                <strong id="totalActive">-</strong>
            </div>
            <div class="metric-card">
                <span>Technical Support</span>
                <strong id="metric-technical-support">-</strong>
            </div>
            <div class="metric-card">
                <span>Sales Chat</span>
                <strong id="metric-sales-chat">-</strong>
            </div>
            <div class="metric-card">
                <span>Customer Feedback</span>
                <strong id="metric-customer-feedback">-</strong>
            </div>
            <button class="refresh-button" type="button" id="refreshMetrics">Refresh</button>
        </section>

        <div class="workspace">
            <section class="panel">
                <div class="section-title">
                    <h2>Compose Message</h2>
                    <span id="activeQueueLabel">Technical Support</span>
                </div>

                <div class="submit-row">
                    <div>
                        <label for="submitQueue">Submit Queue</label>
                        <select id="submitQueue" class="queue-select">
                            <option value="technical-support">Technical Support</option>
                            <option value="sales-chat">Sales Chat</option>
                            <option value="customer-feedback">Customer Feedback</option>
                        </select>
                    </div>
                </div>

                <form id="messageForm" class="message-form"></form>

                <h2 class="actions-title">Queue Actions</h2>
                <div class="actions">
                    <div class="action-row">
                        <button type="button" data-action="/submit">Submit</button>
                        <select class="queue-select" data-for="/submit">
                            <option value="technical-support">Technical Support</option>
                            <option value="sales-chat">Sales Chat</option>
                            <option value="customer-feedback">Customer Feedback</option>
                        </select>
                    </div>
                    <div class="action-row">
                        <button type="button" data-action="/receive-one">Receive One</button>
                        <select class="queue-select" data-for="/receive-one">
                            <option value="technical-support">Technical Support</option>
                            <option value="sales-chat">Sales Chat</option>
                            <option value="customer-feedback">Customer Feedback</option>
                        </select>
                    </div>
                    <div class="action-row">
                        <button type="button" data-action="/receive-all">Receive All</button>
                        <select class="queue-select" data-for="/receive-all">
                            <option value="technical-support">Technical Support</option>
                            <option value="sales-chat">Sales Chat</option>
                            <option value="customer-feedback">Customer Feedback</option>
                        </select>
                    </div>
                    <div class="action-row">
                        <button type="button" data-action="/peek-one">Peek One</button>
                        <select class="queue-select" data-for="/peek-one">
                            <option value="technical-support">Technical Support</option>
                            <option value="sales-chat">Sales Chat</option>
                            <option value="customer-feedback">Customer Feedback</option>
                        </select>
                    </div>
                    <div class="action-row">
                        <button type="button" data-action="/peek-all">Peek All</button>
                        <select class="queue-select" data-for="/peek-all">
                            <option value="technical-support">Technical Support</option>
                            <option value="sales-chat">Sales Chat</option>
                            <option value="customer-feedback">Customer Feedback</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="output">
                <div class="section-title">
                    <h2>Result</h2>
                    <span id="statusBadge">Ready</span>
                </div>
                <pre id="result">Select a queue and choose an action.</pre>
            </section>
        </div>
    </main>

    <script>
        const fieldsByQueue = {
            "technical-support": [
                ["customer", "Customer Name", "John"],
                ["issue", "Issue Description", "Login problem"],
                ["priority", "Priority", "High"]
            ],
            "sales-chat": [
                ["customer", "Customer Name", "Priya"],
                ["product", "Product Interested", "Premium Plan"],
                ["contact", "Contact Number", "9876543210"]
            ],
            "customer-feedback": [
                ["customer", "Customer Name", "Alex"],
                ["feedback", "Feedback", "Great support experience"],
                ["rating", "Rating", "5"]
            ]
        };

        const submitQueue = document.getElementById("submitQueue");
        const form = document.getElementById("messageForm");
        const result = document.getElementById("result");
        const statusBadge = document.getElementById("statusBadge");
        const activeQueueLabel = document.getElementById("activeQueueLabel");
        const refreshMetricsButton = document.getElementById("refreshMetrics");

        function optionLabel(value) {
            return document.querySelector(`#submitQueue option[value="${value}"]`).textContent;
        }

        function renderFields() {
            const fields = fieldsByQueue[submitQueue.value];
            activeQueueLabel.textContent = optionLabel(submitQueue.value);
            form.innerHTML = fields.map(([name, label, placeholder]) => `
                <div class="field">
                    <label for="${name}">${label}</label>
                    <input id="${name}" name="${name}" placeholder="${placeholder}" autocomplete="off">
                </div>
            `).join("");
        }

        function payloadFromForm() {
            return Object.fromEntries(new FormData(form).entries());
        }

        async function loadMetrics() {
            refreshMetricsButton.disabled = true;

            try {
                const response = await fetch("/metrics");
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Unable to load metrics.");
                }

                document.getElementById("totalActive").textContent = data.total_active;
                data.queues.forEach((queue) => {
                    document.getElementById(`metric-${queue.name}`).textContent = queue.active;
                });
            } catch (error) {
                document.getElementById("totalActive").textContent = "!";
                Object.keys(fieldsByQueue).forEach((queueName) => {
                    document.getElementById(`metric-${queueName}`).textContent = "!";
                });
            } finally {
                refreshMetricsButton.disabled = false;
            }
        }

        async function runAction(action, queue) {
            const buttons = document.querySelectorAll(".actions button");
            buttons.forEach((button) => button.disabled = true);
            statusBadge.textContent = "Working";
            statusBadge.className = "working";
            result.textContent = "Working...";
            const body = {
                queue,
                payload: payloadFromForm()
            };

            try {
                const response = await fetch(action, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
                statusBadge.textContent = response.ok ? "Success" : "Error";
                statusBadge.className = response.ok ? "success" : "error";
            } catch (error) {
                result.textContent = error.message;
                statusBadge.textContent = "Error";
                statusBadge.className = "error";
            } finally {
                buttons.forEach((button) => button.disabled = false);
                loadMetrics();
            }
        }

        document.querySelectorAll(".actions button").forEach((button) => {
            button.addEventListener("click", () => {
                const row = button.closest(".action-row");
                const queue = row.querySelector("select").value;
                runAction(button.dataset.action, queue);
            });
        });

        document.querySelector('[data-for="/submit"]').addEventListener("change", (event) => {
            submitQueue.value = event.target.value;
            renderFields();
        });
        submitQueue.addEventListener("change", () => {
            document.querySelector('[data-for="/submit"]').value = submitQueue.value;
            renderFields();
        });
        refreshMetricsButton.addEventListener("click", loadMetrics);
        renderFields();
        loadMetrics();
    </script>
</body>
</html>
